<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resume AI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Smart Resume AI</h1>

        <div class="upload-area">

            <input type="file" id="pdfFile" accept=".pdf">

            <button class="upload-btn" onclick="uploadPDF()">
                Enviar PDF
            </button>

        </div>

        <textarea
            id="resume"
            placeholder="Cole seu currículo aqui..."
        ></textarea>

        <textarea
            id="job"
            placeholder="Cole a descrição da vaga..."
        ></textarea>

        <button onclick="analyzeResume()">
            Analisar Currículo
        </button>

        <button class="secondary-btn" onclick="generateResume()">
            Gerar Currículo Otimizado
        </button>

        <div id="result"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
